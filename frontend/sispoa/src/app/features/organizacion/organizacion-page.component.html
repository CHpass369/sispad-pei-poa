<div class="p-6">
  <h1 class="text-2xl font-semibold text-gray-800 mb-6">Organización Institucional</h1>

  <!-- Tabs -->
  <div class="border-b border-gray-200 mb-6">
    <nav class="flex gap-6">
      <button
        *ngFor="let tab of tabs"
        class="pb-3 text-sm font-medium transition border-b-2 -mb-px"
        [class.border-blue-600]="tabActivo === tab.id"
        [class.text-blue-600]="tabActivo === tab.id"
        [class.border-transparent]="tabActivo !== tab.id"
        [class.text-gray-500]="tabActivo !== tab.id"
        [class.hover:text-gray-700]="tabActivo !== tab.id"
        (click)="activarTab(tab.id)"
      >
        {{ tab.label }}
      </button>
    </nav>
  </div>

  <!-- Contenido de cada tab -->
  <div *ngIf="tabActivo === 'unidades'">
    <app-organizacion-tree></app-organizacion-tree>
  </div>
  <div *ngIf="tabActivo === 'da'">
    <app-organizacion-da></app-organizacion-da>
  </div>
  <div *ngIf="tabActivo === 'ue'">
    <app-organizacion-ue></app-organizacion-ue>
  </div>
</div>
