# =============================================================================
# nginx.conf — Reverse Proxy Principal SISPAD-PEI-POA
# =============================================================================
# Configuración principal para el contenedor nginx-proxy (perfil "full").
# Se monta en /etc/nginx/nginx.conf.
#
# Maneja múltiples upstreams y enruta tráfico según el path:
#   /        → frontend (Angular SPA)
#   /api/    → backend (Django)
#   /admin/  → backend (Django Admin)
#   /static/ → backend (archivos estáticos Django)
#   /media/  → backend (archivos subidos)
# =============================================================================

# ---------------------------------------------------------------------------
# Usuario y procesos
# ---------------------------------------------------------------------------
user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

# ---------------------------------------------------------------------------
# Contexto HTTP
# ---------------------------------------------------------------------------
http {
    # ------------------------------------------------------------------
    # Include MIME types
    # ------------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ------------------------------------------------------------------
    # Rate limiting — 10 req/s por IP
    # ------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=main_limit:10m rate=10r/s;

    # ------------------------------------------------------------------
    # Seguridad: ocultar versión de nginx
    # ------------------------------------------------------------------
    server_tokens off;

    # ------------------------------------------------------------------
    # Security headers (archivo incluíble reutilizable)
    # ------------------------------------------------------------------
    include /etc/nginx/includes/security.conf;

    # ------------------------------------------------------------------
    # Upstreams
    # ------------------------------------------------------------------
    upstream backend_cluster {
        server backend:8000;
    }

    upstream frontend_cluster {
        server frontend:80;
    }

    # ------------------------------------------------------------------
    # Buffers y timeouts
    # ------------------------------------------------------------------
    client_body_buffer_size 128k;
    client_max_body_size 50M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ------------------------------------------------------------------
    # Compresión gzip
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;
    gzip_disable "msie6";

    # ==================================================================
    # Servidor principal
    # ==================================================================
    server {
        listen 80;
        server_name _;

        # --------------------------------------------------------------
        # Frontend — Angular SPA
        # --------------------------------------------------------------
        location / {
            proxy_pass http://frontend_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Rate limiting
            limit_req zone=main_limit burst=20 nodelay;
        }

        # --------------------------------------------------------------
        # API — Backend Django
        # --------------------------------------------------------------
        location /api/ {
            proxy_pass http://backend_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            limit_req zone=main_limit burst=20 nodelay;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # --------------------------------------------------------------
        # Admin — Django Admin
        # --------------------------------------------------------------
        location /admin/ {
            proxy_pass http://backend_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            limit_req zone=main_limit burst=10 nodelay;
        }

        # --------------------------------------------------------------
        # Archivos estáticos de Django
        # --------------------------------------------------------------
        location /static/ {
            proxy_pass http://backend_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # --------------------------------------------------------------
        # Archivos subidos (media)
        # --------------------------------------------------------------
        location /media/ {
            proxy_pass http://backend_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # --------------------------------------------------------------
        # GeoServer — WMS / WFS / WCS
        # --------------------------------------------------------------
        include /etc/nginx/includes/geoserver.conf;

        # --------------------------------------------------------------
        # Keycloak — OIDC Provider
        # --------------------------------------------------------------
        include /etc/nginx/includes/keycloak.conf;
    }
}
