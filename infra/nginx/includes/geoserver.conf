# =============================================================================
# GeoServer — Reverse Proxy / GeoWebCache
# =============================================================================
# Incluído desde nginx.conf dentro del server block.
# Enruta /geoserver/ al contenedor GeoServer interno.
#
# Tuning:
#   - Timeouts largos para WMS GetMap con geometrías complejas
#   - Buffers grandes para tiles de alta resolución
#   - CORS abierto para que OpenLayers / Leaflet consuman directo
#   - Proxy buffering OFF para WFS (respuestas streaming)
# =============================================================================

location /geoserver/ {
    proxy_pass http://sispoa-geoserver:8080/geoserver/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts largos para WMS/WFS (geometrías pesadas)
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Buffers grandes para WMS GetMap tiles grandes
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # CORS para OpenLayers / Leaflet desde cualquier origen
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept" always;

    # Deshabilitar buffering para WFS (respuestas streaming)
    proxy_buffering off;
}
