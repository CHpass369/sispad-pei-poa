# =============================================================================
# Keycloak — Reverse Proxy OIDC
# =============================================================================
# Incluído desde nginx.conf dentro del server block.
# Enruta /auth/ al contenedor Keycloak interno.
#
# El backend Django se comunica directamente con Keycloak vía
# red interna Docker (sispoa-keycloak:8080), no por este proxy.
# Este location es para acceso externo (debug, admin console).
# =============================================================================

location /auth/ {
    proxy_pass http://sispoa-keycloak:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_buffering off;

    # CORS
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Authorization" always;
}
