# =============================================================================
# nginx.conf — Frontend SISPAD-PEI-POA
# =============================================================================
# Este archivo se copia como /etc/nginx/conf.d/default.conf dentro del
# contenedor frontend (Nginx alpine).
#
# Sirve el SPA de Angular y hace proxy inverso hacia el backend Django.
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting — zona compartida: 10 req/s por IP
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=frontend_limit:10m rate=10r/s;

# ---------------------------------------------------------------------------
# Seguridad: ocultar versión de nginx
# ---------------------------------------------------------------------------
server_tokens off;

# ===========================================================================
# Servidor principal
# ===========================================================================
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ------------------------------------------------------------------
    # SPA — todas las rutas no-archivo van a index.html
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Proxy inverso /api/ → backend Django
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting específico para API
        limit_req zone=frontend_limit burst=20 nodelay;

        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Preflight CORS (OPTIONS)
        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ------------------------------------------------------------------
    # Proxy inverso /media/ → backend (archivos subidos)
    # ------------------------------------------------------------------
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Cacheo de archivos estáticos — 30 días
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------------------
    # Proxy inverso /static/ → backend (archivos estáticos de Django)
    # ------------------------------------------------------------------
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cacheo de archivos estáticos — 30 días
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------------------
    # Compresión gzip
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;
}
