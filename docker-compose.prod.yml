# =============================================================================
# SISPAD-PEI-POA — Infraestructura Docker (Produccion)
# Servicios optimizados para despliegue en produccion
# =============================================================================

x-django-env: &django-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Configure DJANGO_SECRET_KEY en .env}
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?Configure DJANGO_ALLOWED_HOSTS en .env}
  DB_ENGINE: ${DB_ENGINE:-django.contrib.gis.db.backends.postgis}
  DB_NAME: ${DB_NAME:-gams_sis_poa}
  DB_USER: ${DB_USER:-sispoa_user}
  DB_PASSWORD: ${DB_PASSWORD:?Configure DB_PASSWORD en .env}
  DB_HOST: ${DB_HOST:-sispoa-postgres}
  DB_PORT: ${DB_PORT:-5432}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Configure CORS_ALLOWED_ORIGINS en .env}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://sispoa-redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://sispoa-redis:6379/0}
  REDIS_URL: ${REDIS_URL:-redis://sispoa-redis:6379/1}

services:

  # --- PostgreSQL + PostGIS ---
  postgres-postgis:
    image: postgis/postgis:17-3.4
    container_name: sispoa-postgres
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gams_sis_poa}
      POSTGRES_USER: ${POSTGRES_USER:-sispoa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Configure DB_PASSWORD en .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sispoa_user} -d ${POSTGRES_DB:-gams_sis_poa}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: sispoa-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - async-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Backend Django ---
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: sispoa-backend
    restart: always
    env_file: .env
    environment:
      <<: *django-env
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres-postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
      - async-net
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Nginx (serves frontend static + reverse proxy a backend) ---
  nginx:
    container_name: sispoa-nginx
    image: nginx:alpine
    restart: always
    volumes:
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./infra/nginx/prod/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/prod/includes:/etc/nginx/includes:ro
      # SSL (descomentar y configurar certificados)
      # - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      # SSL (descomentar para HTTPS)
      # - "443:443"
    depends_on:
      backend:
        condition: service_started
    networks:
      - frontend-net
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Celery Worker (tareas asincronas) ---
  celery-worker:
    container_name: sispoa-celery-worker
    build:
      context: .
      dockerfile: infra/docker/celery/Dockerfile
      args:
        CELERY_COMMAND: worker
        BUILD_ENV: production
    restart: always
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    environment:
      <<: *django-env
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres-postgis:
        condition: service_healthy
    networks:
      - backend-net
      - async-net
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Celery Beat (tareas programadas) ---
  celery-beat:
    container_name: sispoa-celery-beat
    build:
      context: .
      dockerfile: infra/docker/celery/Dockerfile
      args:
        CELERY_COMMAND: beat
        BUILD_ENV: production
    restart: always
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    environment:
      <<: *django-env
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres-postgis:
        condition: service_healthy
    networks:
      - backend-net
      - async-net
    deploy:
      resources:
        limits:
          memory: 512M

  # --- MinIO S3 (almacenamiento de objetos) ---
  minio:
    container_name: sispoa-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: always
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Configure MINIO_ROOT_USER en .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Configure MINIO_ROOT_PASSWORD en .env}
    networks:
      - storage-net
      - backend-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
  redis_data:
  static_volume:
  media_volume:
  minio_data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  storage-net:
    driver: bridge
  async-net:
    driver: bridge
